<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBA & Asociados</title>
    <script type="module" src="/src/main.js"></script>
       
    <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <section class="container my-5">
    <h2 class="text-centers mb-4">Contáctanos</h2>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">      
        <form id="contactForm" class="p-4 border rounded shadow-sm bg-light">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
        </div>

        <div class="mb-3">
          <label for="asunto" class="form-label">Asunto</label>
          <input type="text" class="form-control" id="asunto" placeholder="Motivo de tu mensaje">
        </div>

        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe aquí tu consulta..." required></textarea>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Enviar Mensaje</button>
        </div>
        
      </form>
      </div>
  </div>
</section>
<script type="module" src="/src/main.js"></script>
</body>
